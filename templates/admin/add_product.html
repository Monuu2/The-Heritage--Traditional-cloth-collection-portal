{% extends "admin_layout.html" %}
{% block page_title %}Add Product{% endblock %}
{% block content %}

<div class="adm-form-card">
  <h2>ADD NEW PRODUCT</h2>
  <form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="adm-field">
      <label>Product Name *</label>
      <input type="text" name="name" placeholder="e.g. Bodo Dokhona — Red Weave" required>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="adm-field">
        <label>Price (₹) *</label>
        <input type="number" name="price" placeholder="0.00" step="0.01" min="0" required>
      </div>
      <div class="adm-field">
        <label>Stock Quantity *</label>
        <input type="number" name="stock" placeholder="0" min="0" required>
      </div>
    </div>

    <div class="adm-field">
      <label>Category *</label>
      <select name="category" required>
        <option value="">Select a category</option>
        {% for c in categories %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="adm-field">
      <label>Description</label>
      <textarea name="description" placeholder="Describe the product — material, origin, significance…"></textarea>
    </div>

    <div class="adm-field">
      <label>Product Image</label>
      <input type="file" name="image" accept="image/*">
    </div>

    <div style="margin-top:8px;">
      <button type="submit" class="adm-btn adm-btn-primary">ADD PRODUCT</button>
      <a href="{{ url_for('admin.stock') }}" class="adm-btn adm-btn-secondary">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
